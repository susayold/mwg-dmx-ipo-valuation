name: Deploy portfolio to GitHub Pages

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js for static checks
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download CI-built research artifacts
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: mwg-dmx-research-artifacts
          path: _ci_artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Overlay CI-built artifacts
        if: github.event_name == 'workflow_run'
        shell: bash
        run: |
          set -euo pipefail
          cp -a _ci_artifacts/. .

      - name: Validate standalone portfolio
        run: node --test tests/standalone-html.test.mjs

      - name: Build static portfolio artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          install -d _site/public/downloads
          install -m 0644 index.html _site/index.html
          install -m 0644 public/og.png _site/public/og.png
          install -m 0644 public/favicon.svg _site/public/favicon.svg
          install -m 0644 public/three-statement-data.js _site/public/three-statement-data.js
          install -m 0644 public/standalone-site.js _site/public/standalone-site.js
          cp -a public/downloads/. _site/public/downloads/
          touch _site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
