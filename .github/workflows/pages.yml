name: Deploy portfolio to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js for static checks
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: Validate standalone portfolio
        run: node --test tests/standalone-html.test.mjs

      - name: Build static portfolio artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          install -d _site/public/downloads
          install -m 0644 index.html _site/index.html
          install -m 0644 public/og.png _site/public/og.png
          install -m 0644 public/favicon.svg _site/public/favicon.svg
          cp -a public/downloads/. _site/public/downloads/
          touch _site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
